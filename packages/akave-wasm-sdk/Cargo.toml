[package]
name = "akave-wasm-sdk"                                      # TODO: rename
version = "0.1.0"
authors = ["Gilberto Conde <gilberto.conde@lightshift.xyz>"]
edition = "2021"

[lib]
# Support for both WebAssembly and native builds
crate-type = ["cdylib", "rlib"]

[features]
# Enable optional debugging for panics
default = ["console_error_panic_hook", "std"]
std = []
vendored-protoc = ["protobuf-src"]
vendored-protox = ["protox"]

[profile.release]
# Optimize for small binary size
opt-level = "s"

# -----------------------------------------
#         GENERAL DEPENDENCIES            |
# -----------------------------------------

[dependencies]
# Dependencies shared by all targets
serde = { version = "1.0", features = ["derive"] }
prost = "0.13"
prost-types = "0.13.4"
prost-wkt = "0.6"
prost-wkt-types = "0.6"
serde_json = "1.0.134"
hex = "0.4.3"
sha2 = "0.10.8"
async-trait = "0.1.85"
futures = "0.3.31"
derivative = "2.2.0"
chrono = { version = "0.4.27", default-features = false, features = ["serde"] }

[dev-dependencies]
pretty_assertions = "1"

[build-dependencies]
prost = "0.13"
prost-types = "0.13"
prost-build = "0.13"
prost-wkt-build = "0.6"
protobuf-src = { version = "1.1.0", optional = true }
protox = { version = "0.6.0", optional = true }
tonic-build = { version = "0.12", default-features = false, features = [
  "prost",
] }


# -----------------------------------------

# -----------------------------------------
#          WASM DEPENDENCIES              |
# -----------------------------------------

[target.'cfg(target_arch = "wasm32")'.dependencies]
# WASM-specific dependencies
wasm-bindgen = "0.2.84"
wasm-bindgen-futures = "0.4.49"
serde-wasm-bindgen = "0.4"
tonic-web-wasm-client = "0.6"
serde = { version = "1.0", features = ["derive"] }
tonic = { version = "0.12", default-features = false, features = [
  "prost",
  "codegen",
] }
web-sys = { version = "0.3", features = [
  "Window",
  "Request",
  "console",
  "File",
] }
js-sys = "0.3"
web3 = { version = "0.19.0", default-features = false, features = [
  "wasm",
  "eip-1193",
] }
tsify-next = { version = "0.5.4", default-features = false, features = ["js"] }
wasm-bindgen-file-reader = "1"
# Optional debugging utility for WebAssembly
console_error_panic_hook = { version = "0.1.7", optional = true }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3.49"

[target.'cfg(target_arch = "wasm32")'.build-dependencies]
tsify-next = { version = "0.5.4", default-features = false, features = ["js"] }

# -----------------------------------------

# -----------------------------------------
#        NON WASM DEPENDENCIES            |
# -----------------------------------------

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# Dependencies for native (non-WASM) builds
tonic = { version = "0.12", default-features = false, features = [
  "prost",
  "codegen",
  "transport",
  "tls",
] }
tokio = { version = "1.42.0", features = ["full"] }
getrandom = { version = "0.2.15", features = ["std"] }
alloy = { version = "0.9.2", features = ["full"] }
web3 = { version = "0.19.0" }

#[target.'cfg(not(target_arch = "wasm32"))'.build_dependencies]

# -----------------------------------------
