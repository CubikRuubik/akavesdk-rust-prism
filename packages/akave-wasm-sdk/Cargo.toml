[package]
name = "akave-wasm-sdk"
version = "0.1.0"
authors = ["Gilberto Conde <gilberto.conde@lightshift.xyz>"]
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
tonic = { version = "0.12", default-features = false, features = ["prost", "codegen", "transport", "tls"] }
tonic-web-wasm-client = "0.6"
prost = "0.13"
prost-types = "0.13.4"
prost-wkt = "0.6"
prost-wkt-types = "0.6"
wasm-bindgen = "0.2.84"
wasm-bindgen-futures = "0.4.49"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.4"


# The `console_error_panic_hook` crate provides better debugging of panics by
# logging them with `console.error`. This is great for development, but requires
# all the `std::fmt` and `std::panicking` infrastructure, so isn't great for
# code size when deploying.
console_error_panic_hook = { version = "0.1.7", optional = true }
tokio = { version = "1.42.0", features = ["full"] }

[dev-dependencies]
tonic-web-wasm-client = "0.6"
wasm-bindgen-test = "0.3.49"

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"

[build-dependencies]
prost-build = "0.13"
prost-wkt-build = "0.6"
tonic-build = { version = "0.12", default-features = false, features = [
  "prost",
] }

[build]
target = "web"
